# Render Blueprint -- one-click deploy of the web service + managed Postgres.
# Plans are `free` to start; bump both to a paid tier for true 24/7 (Render's
# free Postgres expires and free web services sleep when idle).
databases:
  - name: bluelines-db
    databaseName: bluelines
    user: bluelines
    plan: free

services:
  - type: web
    name: bluelines
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bluelines-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: PIN_RATE_MAX
        value: "20"
      # Background refresher cadence (seconds). The map serves precomputed
      # snapshots from Postgres, so this is the data-freshness knob, not a
      # latency one. ~45 min matches USGS update frequency.
      - key: REFRESH_INTERVAL
        value: "2700"
      # Token for POST /internal/refresh. Point a free scheduler
      # (GitHub Actions / cron-job.org) at it on a cadence: it refreshes
      # the snapshots AND keeps the free web service awake. Read the
      # generated value from the Render dashboard.
      - key: REFRESH_TOKEN
        generateValue: true
