# Render Blueprint -- one-click deploy of the web service + managed Postgres.
# Plans are `free` to start; bump both to a paid tier for true 24/7 (Render's
# free Postgres expires and free web services sleep when idle).
databases:
  - name: bluelines-db
    databaseName: bluelines
    user: bluelines
    plan: free

services:
  - type: web
    name: bluelines
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bluelines-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: PIN_RATE_MAX
        value: "20"
