name: Data build — clickable streams

# Rebuilds the national clickable-streams artifact (geometry + trout_class) and
# its PMTiles, optionally publishing both to R2. Manually triggered: streams are
# static reference data, rebuilt on a data release (e.g. an NHD vintage refresh
# or a Phase-2 state-enrichment change), not per-PR.
#
# Runner: the free standard `ubuntu-latest`. The builder is VPU-streaming and
# deletes each region's extract after emitting it, so peak disk stays at ~one
# region (a couple GB) even for a full lower-48 build — it fits the standard
# runner's ~14 GB disk, no larger/Team runner required.
#
# Required repo/org secrets (R2, S3-compatible):
#   R2_BUCKET           bucket name (this project's bucket is `bluelines-data`)
#   R2_ENDPOINT         https://<acct>.r2.cloudflarestorage.com
#   R2_ACCESS_KEY_ID    R2 access key id
#   R2_SECRET_ACCESS_KEY  R2 secret access key
#
# Seed-warming convergence (the bootstrap story):
#   The ~30 third-party state ArcGIS trout sources never all answer at the same
#   instant (a different server flaps each run: CO, NY, WI...). Last-known-good
#   seeds (data/nhdplus/seeds/) make the build immune to any one source being
#   down; the build banks EVERY reachable source's seed on EVERY run and pushes
#   them straight to `main` (unprotected). The `schedule:` cron below runs a
#   DAILY seed-warming dry run (input defaults -> upload=false). It is cheap:
#   scripts/seed_status.py checks the seed cache first and the heavy build is
#   SKIPPED unless a source is missing a seed or a seed has aged past
#   SEED_MAX_AGE_DAYS (so once bootstrapped, the daily cron is a no-op until a
#   source is added or seeds drift). To publish, dispatch a manual
#   `workflow_dispatch` with **upload: true** + an `r2_prefix` (manual runs
#   always build, with the full coverage gate); then cut `DATA_BASE_URL` over.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: "VPU ids, comma-separated (blank = all 21 lower-48)"
        required: false
        default: ""
      r2_prefix:
        description: "R2 version prefix to publish under (e.g. v1, v2)"
        required: false
        default: "v1"
      upload:
        description: "Publish artifacts to R2 (uncheck for a dry run)"
        type: boolean
        default: false
  # Seed-warming: daily, never publishes (scheduled runs use the input
  # DEFAULTS, so upload=false). The cheap-skip step below no-ops it once every
  # source has a fresh seed; see the header note above.
  schedule:
    - cron: "0 6 * * *"

# contents: write so the build can commit refreshed last-known-good trout
# seeds (data/nhdplus/seeds/) back to the triggering branch.
permissions:
  contents: write

# Serialize runs: two concurrent builds would race each other's seed-refresh
# commits (and double-publish to R2). Queue rather than cancel — a build is
# expensive and each run's seed capture is worth keeping.
concurrency:
  group: data-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cheap-skip for the daily cron: stdlib-only, runs before any install.
      # Sets need_build=false when every trout source already has a fresh seed,
      # so a scheduled run skips the ~30-min build (the gated steps below).
      # Manual dispatches ignore this and always build.
      - name: Check seed cache (scheduled cheap-skip)
        id: need
        run: python scripts/seed_status.py

      - name: Install build dependencies
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        run: |
          python -m pip install --upgrade pip
          # geopandas pulls shapely + pyogrio with bundled GDAL wheels — no apt GDAL needed.
          pip install dbfread py7zr httpx geopandas shapely

      - name: Install tippecanoe
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install

      - name: Build clickable streams
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        env:
          REGIONS: ${{ inputs.regions }}
          UPLOAD: ${{ inputs.upload }}
        run: |
          args=(--manifest data/nhdplus/clickable_streams.manifest.json)
          if [ -n "$REGIONS" ]; then args+=(--regions "$REGIONS"); fi
          # When actually publishing, fail rather than ship a release that's
          # missing a state's trout tagging because its ArcGIS server was down.
          if [ "$UPLOAD" = "true" ]; then args+=(--require-trout); fi
          python scripts/build_clickable_streams.py "${args[@]}"

      - name: Sanity gate
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        env:
          REGIONS: ${{ inputs.regions }}
        run: |
          python - <<'PY'
          import json, os, sys
          man = json.load(open("data/nhdplus/clickable_streams.manifest.json"))
          n, regions = man["feature_count"], man["regions"]
          size = os.path.getsize("data/nhdplus/clickable_streams.geojson.gz") / 1e6
          print(f"features={n:,} regions={len(regions)} size={size:.1f}MB")
          if n < 1000:
              sys.exit(f"only {n} features — build looks broken")
          # A full lower-48 run should be substantial; guard against a silently
          # truncated build (e.g. a region that returned no geometry).
          if os.environ.get("REGIONS", "") == "" and n < 500_000:
              sys.exit(f"national build only {n} features — looks truncated")
          PY

      # Persist the build's freshly-captured last-known-good seeds
      # (data/nhdplus/seeds/, one JSON per trout source) so the NEXT build can
      # tag a state from a prior capture when its ArcGIS server is down. The
      # builder only writes seeds on full-region runs and skips byte-identical
      # captures, so this commits nothing on partial/dry runs with no changes.
      #
      # if: always() — seeds are banked even when the build step EXITED 3 on a
      # --require-trout coverage gate. That's the whole convergence mechanism:
      # each gated upload-run still banks every reachable source's seed, so a
      # later run finds that source covered. PMTiles + Publish below stay gated
      # on build success (default step behaviour: they're skipped after exit 3),
      # so an incomplete-coverage build never publishes.
      - name: Commit refreshed trout seeds
        # always() so a --require-trout build that EXITED 3 still banks its
        # seeds (the convergence mechanism); the rest gates out the scheduled
        # cheap-skip case (no build ran -> nothing to commit).
        if: ${{ always() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        run: |
          git config user.name "data-build-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/nhdplus/seeds
          if git diff --cached --quiet; then
            echo "seed captures unchanged; nothing to commit"
            exit 0
          fi
          git commit -m "data-build: refresh trout-source seeds [no ci]"
          # Push FIRST. The common case is the branch hasn't moved, so the push
          # fast-forwards immediately; only if it's REJECTED (branch moved, e.g.
          # a PR merge landed mid-build) do we rebase and retry. The old form
          # `git pull --rebase && git push` was a BUG: on the detached-HEAD CI
          # checkout the rebase step fails, the && short-circuits, and the push
          # never runs -- seeds were committed but silently never pushed. A lost
          # race only costs this run's refresh (next build recaptures), so warn
          # rather than fail the artifact/publish steps that follow.
          for i in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "seed push attempt $i rejected; rebasing on the branch tip"
            git pull --rebase origin "${GITHUB_REF_NAME}" \
              || git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
          echo "::warning::seed refresh not pushed after 3 attempts (branch kept moving); seeds will refresh on the next successful build"

      - name: Build PMTiles
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        env:
          TMPDIR: ${{ runner.temp }}
        run: scripts/build_stream_tiles.sh

      # Printed AFTER tippecanoe so it's near the end of the log (the build's own
      # stdout histogram gets buried behind tippecanoe's progress).
      - name: Tier calibration
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        run: |
          python - <<'PY'
          import json
          m = json.load(open("data/nhdplus/clickable_streams.manifest.json"))
          tc = m.get("trout_tier_counts", {})
          tot = sum(tc.values()) or 1
          print("=== TIER CALIBRATION (tagged reaches) ===")
          for t in ("gold", "class1", "class2", "class3"):
              n = tc.get(t, 0)
              print(f"  {t}: {n:,} ({100 * n / tot:.2f}%)")
          print("  classes:", m.get("trout_class_counts"))
          print("  native reaches (is_native):", m.get("trout_native_count"))
          PY

      - name: Publish to R2
        if: ${{ inputs.upload }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
          PMTILES: ${{ runner.temp }}/streams.pmtiles
        run: |
          base="s3://$R2_BUCKET/$R2_PREFIX"
          put() { aws s3 cp "$1" "$base/$2" --endpoint-url "$R2_ENDPOINT" "${@:3}"; }
          put data/nhdplus/clickable_streams.geojson.gz clickable_streams.geojson.gz
          put data/nhdplus/clickable_streams.manifest.json clickable_streams.manifest.json
          put "$PMTILES" streams.pmtiles --content-type application/octet-stream
          echo "Published to $base"

      - name: Upload build artifacts
        if: ${{ success() && (github.event_name != 'schedule' || steps.need.outputs.need_build == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: clickable-streams
          path: |
            data/nhdplus/clickable_streams.geojson.gz
            data/nhdplus/clickable_streams.manifest.json
          if-no-files-found: error

      # if: always() — runs even after the build step exits 3 on the coverage
      # gate, so the summary still shows what was banked and what's still
      # uncovered. (The build step itself already appended the "Seed coverage:"
      # line to the step summary; this adds the manifest + publish guidance.)
      - name: Job summary
        if: always()
        env:
          UPLOADED: ${{ inputs.upload }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
          IS_CRON: ${{ github.event_name == 'schedule' }}
          NEED_BUILD: ${{ steps.need.outputs.need_build }}
        run: |
          {
            echo "### Clickable-streams build"
            if [ "$IS_CRON" = "true" ] && [ "$NEED_BUILD" != "true" ]; then
              echo "_Scheduled cheap-skip — every trout source already has a fresh seed, so the build was skipped. See the **seed status** line above._"
            elif [ -f data/nhdplus/clickable_streams.manifest.json ]; then
              echo '```json'
              cat data/nhdplus/clickable_streams.manifest.json
              echo '```'
            else
              echo "_No manifest produced (build failed before emitting one)._"
            fi
            if [ "$IS_CRON" = "true" ]; then
              echo "_Scheduled seed-warming run — builds + banks seeds when a source is missing a seed or one has aged out; never publishes. To publish, dispatch with **upload: true**._"
            elif [ "$UPLOADED" = "true" ]; then
              echo "Published to R2 prefix \`$R2_PREFIX\`. To cut over:"
              echo "set \`VITE_STREAM_TILES_URL=<DATA_BASE_URL>/streams.pmtiles\` (and \`DATA_BASE_URL\` for the GeoJSON path) and redeploy."
            else
              echo "_Dry run — nothing published. Re-run with **upload** checked to publish._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
