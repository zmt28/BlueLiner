name: Refresh Blueliner precompute

# Triggers the background refresher that keeps every focused state's
# river snapshot + gauge identity (gauge_meta) warm in Postgres. ~30 min matches
# USGS update cadence; the in-process refresher also runs (this is the
# belt that makes sure it happens even when nobody's on the site).
#
# Required repo secrets:
#   BLUELINES_URL    e.g. https://blueliner.app (NO trailing slash)
#   REFRESH_TOKEN    must match the token Render generated for the service
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /internal/refresh
        run: |
          curl -fsS -m 30 -X POST \
            -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
            "${{ secrets.BLUELINES_URL }}/internal/refresh"
