name: GIS endpoint verify (western states)

# Ad-hoc discovery + verification of state-agency stocking / fishing-access
# ArcGIS endpoints. Runs in Actions because the crawl needs open egress to
# arbitrary state GIS hosts. Triggered by pushing changes to the request file
# (scripts/gis_verify_request.txt) on a working branch; results go to the log.

on:
  push:
    branches:
      - "claude/hopeful-wozniak-4q57av"
    paths:
      - "scripts/gis_verify_request.txt"
      - "scripts/gis_endpoint_verify.py"
      - ".github/workflows/gis-endpoint-verify.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install httpx
      - name: Discover + verify
        run: |
          mkdir -p gis_verify_out
          python scripts/gis_endpoint_verify.py \
            --request scripts/gis_verify_request.txt | tee gis_verify_out/REPORT.txt
      - name: Commit report back to branch
        if: always()
        run: |
          git config user.name "gis-verify-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f gis_verify_out/REPORT.txt
          git commit -m "gis-verify: results report [no ci]" || exit 0
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
