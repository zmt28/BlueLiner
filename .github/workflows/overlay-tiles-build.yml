name: Data build — point-overlay tiles (access/dams/stocking)

# Builds a POINT-overlay PMTiles archive (access | dams | stocking) and
# optionally publishes it to R2. These static reference overlays move off the
# in-RAM /api/{access,dams,stocking} path (which OOMed the 512 MB free
# instance) and onto pmtiles:// served straight from R2 — same architecture as
# streams/trails/public-lands. Manually triggered per data release.
#
# access  : the GeoJSON is already published by river-poi-build.yml, so we pull
#           it from R2 and only tile it here.
# dams    : national NID, fetched fresh by build_overlay_geojson.py (egress).
# stocking: curated baselines + live agency feeds, merged the same way.
#
# Required repo/org secrets (R2, S3-compatible): R2_BUCKET, R2_ENDPOINT,
# R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY.

on:
  workflow_dispatch:
    inputs:
      layer:
        description: "Which overlay to build"
        type: choice
        options: [access, dams, stocking]
        default: access
      r2_prefix:
        description: "R2 version prefix (source + publish target, e.g. v4)"
        required: false
        default: "v4"
      upload:
        description: "Publish the .pmtiles to R2 (uncheck for a dry run)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: overlay-tiles-build-${{ inputs.layer }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PREFIX: ${{ inputs.r2_prefix }}
      LAYER: ${{ inputs.layer }}
      # build_poi_tiles.sh writes <layer>.pmtiles under $TMPDIR; point it at the
      # same dir the artifact-upload step reads so the run doesn't red-X *after*
      # a successful R2 publish (the default $TMPDIR=/tmp != runner.temp).
      TMPDIR: ${{ runner.temp }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # dams/stocking producers reuse the app's arcgis/shapely helpers.
          pip install httpx shapely

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install

      - name: Resolve source GeoJSON
        id: src
        run: |
          case "$LAYER" in
            access)   echo "path=data/access_points/access.geojson.gz" >> "$GITHUB_OUTPUT" ;;
            dams)     echo "path=data/dams/dams.geojson.gz"            >> "$GITHUB_OUTPUT" ;;
            stocking) echo "path=data/stocking/stocking.geojson.gz"    >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Fetch published access GeoJSON (access only)
        if: ${{ inputs.layer == 'access' }}
        run: |
          mkdir -p data/access_points
          aws s3 cp "s3://$R2_BUCKET/$R2_PREFIX/access.geojson.gz" \
            "${{ steps.src.outputs.path }}" --endpoint-url "$R2_ENDPOINT"

      - name: Produce national GeoJSON (dams / stocking)
        if: ${{ inputs.layer != 'access' }}
        run: python scripts/build_overlay_geojson.py "$LAYER" --out "${{ steps.src.outputs.path }}"

      - name: Sanity gate
        run: |
          python - "$LAYER" "${{ steps.src.outputs.path }}" <<'PY'
          import gzip, json, sys
          layer, path = sys.argv[1], sys.argv[2]
          n = sum(1 for _ in json.load(gzip.open(path, "rt"))["features"])
          print(f"{layer}: {n:,} features")
          floor = {"access": 1000, "dams": 1000, "stocking": 500}[layer]
          if n < floor:
              sys.exit(f"only {n} {layer} features — build looks broken/empty")
          PY

      - name: Build PMTiles
        run: |
          args=("$LAYER" "${{ steps.src.outputs.path }}")
          if [ "${{ inputs.upload }}" = "true" ]; then args+=(--upload); fi
          scripts/build_poi_tiles.sh "${args[@]}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: overlay-tiles-${{ inputs.layer }}
          path: |
            ${{ runner.temp }}/${{ inputs.layer }}.pmtiles
          if-no-files-found: error

      - name: Next steps
        if: ${{ inputs.upload }}
        run: |
          U=$(echo "$LAYER" | tr '[:lower:]' '[:upper:]')
          echo "Published ${LAYER}.pmtiles to R2 prefix $R2_PREFIX."
          echo "Set VITE_${U}_TILES_URL=<DATA_BASE_URL>/${LAYER}.pmtiles and redeploy."
