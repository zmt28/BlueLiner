name: Data build — river POI (access)

# Phase 1 of docs/river-poi-coverage-plan.md: build the national, river-clipped
# angler-ACCESS overlay from authoritative coordinate sources (OSM from the
# national Geofabrik extract, RIDB, state agency ArcGIS feeds), replacing the
# hand-curated baselines.
#
# Runs in Actions because the Claude Code sandbox egress blocks Geofabrik /
# Overpass / RIDB / state hosts. Manually triggered. Start with `probe: true` to
# validate that each source is reachable (the Geofabrik path just HEAD-checks the
# extract -- no 10 GB download) WITHOUT clipping/writing; then a full run; then
# `upload: true` to publish to R2.
#
# Secrets: RIDB_API_KEY (optional; RIDB skipped without it) + the R2 set
# (R2_BUCKET / R2_ENDPOINT / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY) for upload.

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "comma list: osm,ridb,agency"
        required: false
        default: "osm,ridb,agency"
      probe:
        description: "Fetch + count only (no clip/write)"
        type: boolean
        default: true
      buffer_m:
        description: "keep points within this many metres of a reach"
        required: false
        default: "150"
      osm_mode:
        description: "OSM source: geofabrik (national, scales to parking) or overpass"
        required: false
        default: "geofabrik"
      streams_url:
        description: "National clickable-streams geojson.gz for the river-clip"
        required: false
        default: "https://data.blueliner.app/v4/clickable_streams.geojson.gz"
      public_lands_url:
        description: "PAD-US public_lands.geojson.gz for park-name enrichment"
        required: false
        default: "https://data.blueliner.app/v4/public_lands.geojson.gz"
      r2_prefix:
        description: "R2 version prefix to publish under (e.g. v4)"
        required: false
        default: "v4"
      upload:
        description: "Publish access.geojson.gz to R2 (uncheck for a dry run)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: river-poi-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # The national OSM sweep (12 GB Geofabrik download + osmium filter/export +
    # river-clip of millions of parking features) needs more than the default;
    # the vectorized clip keeps the compute in minutes, the download dominates.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # geopandas pulls shapely + pyproj with bundled GDAL wheels.
          pip install httpx geopandas shapely pyproj

      - name: Install osmium-tool (Geofabrik OSM path)
        run: sudo apt-get update && sudo apt-get install -y osmium-tool

      - name: Fetch national stream network (river-clip target)
        if: ${{ inputs.probe == false }}
        env:
          STREAMS_URL: ${{ inputs.streams_url }}
        run: |
          # The repo bundles only the mid-Atlantic dev subset; a NATIONAL clip
          # needs the full network published to R2. Overwrite the bundled file
          # so build_river_poi.py's default --streams path picks it up.
          echo "Downloading $STREAMS_URL ..."
          curl -fsSL "$STREAMS_URL" -o data/nhdplus/clickable_streams.geojson.gz
          ls -la data/nhdplus/clickable_streams.geojson.gz

      - name: Fetch PAD-US public lands (park-name enrichment)
        if: ${{ inputs.probe == false }}
        env:
          PUBLIC_LANDS_URL: ${{ inputs.public_lands_url }}
        run: |
          mkdir -p data/public_lands
          echo "Downloading $PUBLIC_LANDS_URL ..."
          curl -fsSL "$PUBLIC_LANDS_URL" -o data/public_lands/public_lands.geojson.gz
          ls -la data/public_lands/public_lands.geojson.gz

      - name: Build river-POI access overlay
        env:
          RIDB_API_KEY: ${{ secrets.RIDB_API_KEY }}
          SOURCES: ${{ inputs.sources }}
          BUFFER_M: ${{ inputs.buffer_m }}
          OSM_MODE: ${{ inputs.osm_mode }}
          PROBE: ${{ inputs.probe }}
        run: |
          # Keep the ~10 GB Geofabrik pbf + osmium scratch off the small repo
          # disk (RUNNER_TEMP has the room); it's never an artifact.
          args=(--sources "$SOURCES" --buffer-m "$BUFFER_M" \
                --osm-mode "$OSM_MODE" --osm-workdir "$RUNNER_TEMP/osm")
          if [ "$PROBE" = "true" ]; then args+=(--probe); fi
          if [ "$PROBE" != "true" ]; then \
            args+=(--public-lands data/public_lands/public_lands.geojson.gz); fi
          # -u: unbuffered so the per-stage progress/timing lines stream live
          # (a killed buffered run shows nothing); the national parking sweep
          # is long, so visibility matters.
          python -u scripts/build_river_poi.py "${args[@]}"

      - name: Sanity gate
        if: ${{ inputs.probe == false }}
        run: |
          python - <<'PY'
          import gzip, json, os, sys
          p = "data/access_points/access.geojson.gz"
          n = sum(1 for _ in json.load(gzip.open(p, "rt"))["features"])
          m = json.load(open("data/access_points/access.manifest.json"))
          print(f"features={n:,} by_source={m['by_source']} by_type={m['by_type']}")
          if n < 1000:
              sys.exit(f"only {n} access points — build looks broken/empty")
          PY

      - name: Publish to R2
        if: ${{ inputs.upload && inputs.probe == false }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
        run: |
          base="s3://$R2_BUCKET/$R2_PREFIX"
          aws s3 cp data/access_points/access.geojson.gz "$base/access.geojson.gz" \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 cp data/access_points/access.manifest.json "$base/access.manifest.json" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Published to $base"

      - name: Upload build artifact
        if: ${{ inputs.probe == false }}
        uses: actions/upload-artifact@v4
        with:
          name: river-poi-access
          path: |
            data/access_points/access.geojson.gz
            data/access_points/access.manifest.json
          if-no-files-found: error
