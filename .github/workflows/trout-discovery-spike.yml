name: Trout discovery spike (Phase 0)

# Phase-0 feasibility probe for automating state trout-source discovery.
# Runs in GitHub Actions because the crawl/probe needs OPEN EGRESS to reach
# arbitrary state ArcGIS hosts -- something an allowlisted sandbox can't do, and
# something we can't enumerate in advance (the whole point is finding unknown
# endpoints). Manually triggered; emits per-state dossiers + a memo as an
# artifact for human review. See docs/trout-discovery-spike.md.

on:
  workflow_dispatch:
    inputs:
      states:
        description: "States to discover (comma-separated)."
        required: false
        # Eastern/midwestern batch -- where the wild/stocked-designation model
        # holds (vs the western quality-ribbon/biomass data, deferred to a
        # separate data-model design). IA (self-hosted, Driftless designations)
        # and MO (Blue=wild / Red+White=stocked ribbons) are the cleanest fits;
        # SC has a named Trout Streams AGOL layer; KY/ME/OH are likely thinner
        # (KY = 6 wild streams + put-grow-take, ME wild signal is lakes not
        # streams, OH = put-and-take points only). MN carries over for its
        # deeper DNR-folder re-search. WI/CT/MI already onboarded.
        default: "IA,MO,SC,KY,ME,OH,MN"
      top_k:
        description: "Candidate endpoints probed per state"
        required: false
        default: "8"
      probe_url:
        description: "If set, ONLY dump this layer's schema (fields + distinct values); skips discovery. For wiring whole_layer dossiers."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install httpx

      # probe_url mode: dump one layer's schema and stop (for wiring a state
      # whose dossier came back whole_layer because its category field doesn't
      # speak trout vocabulary). All discovery steps below are gated off.
      - name: Probe a single layer's schema
        if: ${{ inputs.probe_url != '' }}
        run: python scripts/probe_layer.py "${{ inputs.probe_url }}"

      - name: Classifier eval vs 10 shipped states (offline gate)
        if: ${{ inputs.probe_url == '' }}
        run: python scripts/discover_trout_sources.py eval

      - name: Discovery recall vs 10 shipped states (network)
        if: ${{ inputs.probe_url == '' }}
        continue-on-error: true   # measurement, not a hard fail
        run: python scripts/discover_trout_sources.py recall --top-k "${{ inputs.top_k }}"

      - name: Discover fresh states
        if: ${{ inputs.probe_url == '' }}
        run: |
          python scripts/discover_trout_sources.py discover \
            --states "${{ inputs.states }}" \
            --top-k "${{ inputs.top_k }}" \
            --out discovery_out

      - name: Print dossiers + memo to log
        if: ${{ always() && inputs.probe_url == '' }}
        run: |
          echo "===== MEMO ====="; cat discovery_out/MEMO.md || true
          for f in discovery_out/*.json; do
            echo "===== $f ====="; cat "$f"; echo
          done

      - name: Upload dossiers + memo
        if: ${{ always() && inputs.probe_url == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: trout-discovery-dossiers
          path: discovery_out/
          if-no-files-found: warn
