name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          # Scope the cache-key hash to the literal requirements files.
          # Without this, setup-python globs the whole working tree and
          # can race with git's loose objects -> intermittent
          # "ENOENT scandir .git/objects/XX" failures.
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
